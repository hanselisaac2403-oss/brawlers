      <style>

    /* RESET */
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    /* BODY */
    body {
      background-color: #ff1010;
      color: #fcfcfb;
      font-family: Arial, sans-serif;
    }

    /* NAVBAR */
    .barra-navegacion {
      background-color: #fce25a;
      padding: 15px 20px;

      display: flex;
      justify-content: space-between;
      align-items: center;

      flex-wrap: wrap;
    }

    .logo img{
      width: 80px;
    }

    .barra-navegacion ul {
      display: flex;
      gap: 20px;
      list-style: none;
      flex-wrap: wrap;
    }

    .barra-navegacion li, .barra-navegacion a {
      color:black;
      font-weight:bold;
      cursor:pointer;
      text-decoration: none;
    }

    .barra-navegacion a:hover {
      text-decoration: underline;
    }

    /* CONTENEDOR PRINCIPAL */
    .contenedor-principal {
      display: flex;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    /* CONTENIDO */
    .contenido {
      background-color: #16213e;
      padding: 20px;
      border-radius: 15px;

      flex: 2;
      min-width: 280px;
    }

    /* BARRA LATERAL */
    .barra-lateral {
      background-color: #0f3460;
      padding: 20px;
      border-radius: 15px;
      border: 2px solid #e94560;

      flex: 1;
      min-width: 250px;
    }

    /* GALERÍA */
    .galeria {
      display: flex;
      gap: 20px;
      justify-content: center;

      flex-wrap: wrap;

      padding: 20px;
    }

    /* TARJETAS */
    .personaje {
      background-color: #16213e;
      border-radius: 15px;
      padding: 15px;

      width: 100%;
      max-width: 400px;

      text-align: center;

      cursor: pointer;

      transition: transform 0.3s;
    }

    .personaje:hover{
      transform: scale(1.03);
    }

    /* IMÁGENES */
    .personaje img {
      width: 100%;
      height: 250px;

      object-fit: cover;
      border-radius: 10px;
    }

    /* INFO OCULTA */
    .info {
      margin-top: 10px;

      max-height: 0;
      overflow: hidden;

      opacity: 0;

      transition: all 0.5s ease;
    }

    /* INFO VISIBLE */
    .personaje.activo .info{
      max-height: 300px;
      opacity: 1;
    }

    .info p {
      text-align: left;
      font-size: 14px;
      line-height: 1.5;
      margin-top: 10px;
    }

    /* BOTÓN */
    .boton {
      display: block;

      margin: 30px auto;

      color: chartreuse;
      background-color: black;

      border: none;
      border-radius: 10px;

      padding: 15px 25px;

      font-size: 20px;
      cursor: pointer;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {

      .barra-navegacion {
        flex-direction: column;
        gap: 15px;
      }

      .barra-navegacion ul {
        justify-content: center;
      }

      .contenedor-principal {
        flex-direction: column;
      }

      .personaje img {
        height: 200px;
      }

    }
