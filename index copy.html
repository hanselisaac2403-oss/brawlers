<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<nav class="barra-navegacion">
    <h2>🚀 LogoGenial</h2>
    <ul>
      <li>Inicio</li>
      <li>Juegos</li>
      <li>Contacto</li>
    </ul>
  </nav>
    <div class="contenedor-principal">
    
    <main class="contenido">
      <h1>¡Bienvenidos a mi Base Secreta!</h1>
      <p>Esta es mi primera página web real. Aquí voy a poner mis trucos y cosas favoritas.</p>
      <img src="https://via.placeholder.com/500x200" alt="Mi imagen genial" style="max-width: 100%;">
    </main>

    <aside class="barra-lateral">
      <h3>⚡ Datos Curiosos</h3>
      <p>Nivel: Principiante de Código</p>
      <p>Poder especial: Aprender rápido</p>
    </aside>

  </div>  
</body>
</html>
<style>
/* 1. EL FONDO DE LA PÁGINA */
body {
  background-color: #0dce27; /* Modo oscuro */
  color: rgb(26, 148, 15);
  font-family: Arial, sans-serif;
  margin: 0; /* Quita los bordes blancos aburridos */
}

/* 2. LA BARRA DE ARRIBA (Navegación) */
.barra-navegacion {
  background-color: #640bca; /* Un color neón vibrante */
  padding: 15px 30px;
  display: flex; /* MAGIA: Pone el logo y la lista en la misma línea */
  justify-content: space-between; /* Separa el logo a la izquierda y el menú a la derecha */
  align-items: center;
}

.barra-navegacion ul {
  display: flex;
  gap: 20px; /* Espacio entre las palabras del menú */
  list-style: none; /* Le quita los puntos feos a la lista */
}

/* 3. ORGANIZANDO EL CONTENIDO Y LA BARRA LATERAL */
.contenedor-principal {
  display: flex; /* MAGIA: Pone las dos cajas lado a lado */
  padding: 20px;
  gap: 20px;
}

/* 4. LA CAJA PRINCIPAL */
.contenido {
  background-color: #16213e;
  padding: 20px;
  border-radius: 15px; /* Hace que las esquinas sean redonditas */
  flex: 2; /* Le dice que tome el doble de espacio que la barra lateral */
}

/* 5. LA CAJA LATERAL */
.barra-lateral {
  background-color: #0f3460;
  padding: 20px;
  border-radius: 15px;
  flex: 1; /* Toma menos espacio */
  border: 2px solid #e94560; /* Un borde brillante para que resalte */
}




</style>
